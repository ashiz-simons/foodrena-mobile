name: foodrena_mobile
description: Foodrena customer & rider mobile app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / Core
  cupertino_icons: ^1.0.6
  provider: ^6.1.2

  # Networking
  http: ^1.2.1
  socket_io_client: ^2.0.3+1

  # Storage
  shared_preferences: ^2.2.2

  # Navigation / Utils
  intl: ^0.19.0

  # WebView (Paystack)
  webview_flutter: ^4.7.0

  # Maps (future rider tracking)
  google_maps_flutter: ^2.6.1
  location: ^5.0.3

  #location (rider)
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/